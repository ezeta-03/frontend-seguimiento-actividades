<!doctype html>
<html lang="es">
<head>
  <base target="_top" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Actividades</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    .splash {
      text-align: center;
      opacity: 0;
      animation: fadeIn .4s ease forwards;
    }
    .splash-logo {
      width: 80px;
      margin-bottom: 20px;
    }
    .splash-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,76,0,.3);
      border-top-color: #ff4c00;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 16px auto 0;
    }
    .splash-text {
      font-size: 14px;
      color: rgba(255,255,255,.5);
      margin-top: 12px;
    }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="splash">
    <img
      class="splash-logo"
      src="https://www.zaazmago.com/canvas/wp-content/uploads/logo-zaaz-mago-001.svg"
      alt="ZaazMago"
    />
    <p class="splash-text">Cargando...</p>
    <div class="splash-spinner"></div>
  </div>

  <script>
    var SESSION_TTL = 24 * 60 * 60 * 1000; // 24 horas

    function sesionLocalValida() {
      try {
        var raw = localStorage.getItem('usuario');
        if (!raw) return null;
        var datos = JSON.parse(raw);
        if (!datos || !datos.email) return null;
        if (datos._ts && (Date.now() - datos._ts) > SESSION_TTL) {
          localStorage.removeItem('usuario');
          return null;
        }
        return datos;
      } catch(e) {
        localStorage.removeItem('usuario');
        return null;
      }
    }

    function cargarDashboard() {
      google.script.run
        .withSuccessHandler(function(html) {
          document.open();
          document.write(html);
          document.close();
        })
        .withFailureHandler(function(err) {
          console.error('Error cargando dashboard:', err);
          cargarLogin();
        })
        .getDashboardHtml();
    }

    function cargarLogin() {
      google.script.run
        .withSuccessHandler(function(html) {
          document.open();
          document.write(html);
          document.close();
        })
        .withFailureHandler(function(err) {
          console.error('Error cargando login:', err);
        })
        .getLoginHtml();
    }

    // ── Lógica de decisión ───────────────────────────────
    // 1. Si hay sesión local válida (< 24h) → Dashboard directo
    // 2. Si no → preguntar al servidor si hay sesión de Google activa
    //    2a. Sí → guardar en localStorage → Dashboard
    //    2b. No → Login

    var sesionLocal = sesionLocalValida();

    if (sesionLocal) {
      // Sesión local válida → Dashboard sin llamada al servidor
      cargarDashboard();
    } else {
      // Verificar sesión de Google en el servidor
      google.script.run
        .withSuccessHandler(function(usuario) {
          if (usuario && usuario.email) {
            // Sesión activa en Google → guardar y cargar Dashboard
            usuario._ts = Date.now();
            localStorage.setItem('usuario', JSON.stringify(usuario));
            cargarDashboard();
          } else {
            // Sin sesión → Login
            cargarLogin();
          }
        })
        .withFailureHandler(function(err) {
          console.error('Error verificando sesión:', err);
          cargarLogin();
        })
        .obtenerSesionActiva();
    }
  </script>
</body>
</html>
