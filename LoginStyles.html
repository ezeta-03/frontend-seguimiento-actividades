<style>
  /* ══════════════════════════════════════════════════════════
     LOGIN STYLES - Sistema de Actividades
     Solo estilos exclusivos de la página de Login
     SharedStyles.html debe cargarse ANTES que este archivo
  ══════════════════════════════════════════════════════════ */

  /* body del login: centrado vertical y horizontal */
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Posición del toggle en login: esquina superior derecha */
  .theme-toggle {
    top: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    box-shadow: 0 4px 12px var(--shadow-strong);
  }

  .theme-toggle:hover {
    box-shadow: 0 6px 16px var(--shadow-strong);
  }

  /* ── CONTENEDOR PRINCIPAL ── */
  .login-container {
    background: var(--surface);
    border-radius: 20px;
    box-shadow: 0 20px 60px var(--shadow-strong);
    max-width: 420px;
    width: 100%;
    padding: 50px 40px;
    text-align: center;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
  }

  /* ── LOGO ── */
  .logo {
    width: 140px;
    height: 140px;
    margin: 0 auto 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--primary);
    border-radius: 50%;
    box-shadow: 0 8px 24px var(--shadow);
  }

  .logo img {
    width: 80%;
    height: 80%;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }

  /* ── TEXTOS ── */
  h1 {
    color: var(--text);
    font-size: 28px;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .subtitle {
    color: var(--text-secondary);
    font-size: 15px;
    margin-bottom: 40px;
    font-weight: 400;
  }

  /* ── BOTÓN (override para login: ancho completo) ── */
  .btn {
    width: 100%;
    padding: 14px 30px;
    border-radius: 10px;
    font-size: 16px;
    box-shadow: 0 4px 12px var(--shadow);
    justify-content: center;
  }

  /* ── LOADING ── */
  .loading {
    display: none;
    margin-top: 20px;
    color: var(--text);
    font-size: 14px;
  }

  .spinner {
    width: 30px;
    height: 30px;
    margin: 0 auto 10px;
  }

  /* ── INFO BOX ── */
  .info-box {
    background: var(--background);
    border-left: 4px solid var(--primary);
    padding: 15px;
    margin-top: 30px;
    border-radius: 8px;
    text-align: left;
    font-size: 13px;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .info-box strong {
    display: block;
    margin-bottom: 8px;
    color: var(--primary);
  }

  .info-box p {
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* ── DEBUG LOG ── */
  .debug-log {
    background: #1e1e1e;
    color: #00ff00;
    padding: 15px;
    margin-top: 20px;
    border-radius: 4px;
    text-align: left;
    font-family: "Courier New", monospace;
    font-size: 11px;
    max-height: 200px;
    overflow-y: auto;
    display: none;
  }

  .debug-log.active {
    display: block;
  }

  /* ── ERROR BOX ── */
  .error-box {
    background: rgba(222, 95, 125, 0.1);
    border-left: 4px solid #de5f7d;
    padding: 15px;
    margin-top: 20px;
    border-radius: 8px;
    text-align: left;
    font-size: 13px;
    color: #de5f7d;
    display: none;
    border: 1px solid rgba(222, 95, 125, 0.3);
  }

  .error-box.active {
    display: block;
  }

  /* ══════════════════════════════════════════════════════════
     RESPONSIVE
  ══════════════════════════════════════════════════════════ */

  /* Tablet */
  @media (min-width: 768px) and (max-width: 1023px) {
    .login-container { max-width: 480px; }
  }

  /* Mobile Large */
  @media (min-width: 480px) and (max-width: 767px) {
    .login-container { max-width: 400px; padding: 45px 35px; }
    h1 { font-size: 26px; }
    .logo { width: 130px; height: 130px; }
    .theme-toggle { width: 48px; height: 48px; font-size: 22px; }
  }

  /* Mobile Small */
  @media (max-width: 479px) {
    body { padding: 15px; }
    .login-container { padding: 35px 25px; }
    h1 { font-size: 22px; }
    .subtitle { font-size: 14px; margin-bottom: 35px; }
    .logo { width: 110px; height: 110px; margin-bottom: 25px; }
    .btn { padding: 12px 24px; font-size: 15px; }
    .info-box { padding: 12px; font-size: 12px; margin-top: 25px; }
    .theme-toggle { top: 15px; right: 15px; width: 44px; height: 44px; font-size: 20px; }
  }

  /* Landscape */
  @media (max-height: 600px) and (orientation: landscape) {
    .login-container { padding: 30px; max-height: 90vh; overflow-y: auto; }
    .logo { width: 100px; height: 100px; margin-bottom: 20px; }
    h1 { font-size: 22px; margin-bottom: 6px; }
    .subtitle { font-size: 13px; margin-bottom: 30px; }
    .info-box { margin-top: 20px; }
  }
</style>
