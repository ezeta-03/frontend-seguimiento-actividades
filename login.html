<!doctype html>
<html lang="es">

<head>
  <base target="_top" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Actividades - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root[data-theme="light"] {
      --primary: #ff4c00;
      --secondary: #ff6b2b;
      --background: #ffffff;
      --surface: #ffffff;
      --text: #000000;
      --text-secondary: #666666;
      --border: #e0e0e0;
      --shadow: rgba(255, 76, 0, 0.1);
      --shadow-strong: rgba(0, 0, 0, 0.1);
    }

    :root[data-theme="dark"],
    :root:not([data-theme]) {
      --primary: #ff4c00;
      --secondary: #ff6b2b;
      --background: #1c2532;
      --surface: #252e3e;
      --text: #ffffff;
      --text-secondary: #b0b0b0;
      --border: #3a4556;
      --shadow: rgba(255, 76, 0, 0.2);
      --shadow-strong: rgba(0, 0, 0, 0.3);
    }

    body {
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
        Cantarell, sans-serif;
      background: var(--background);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s ease;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px var(--shadow-strong);
      z-index: 1000;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 16px var(--shadow-strong);
    }

    .login-container {
      background: var(--surface);
      border-radius: 20px;
      box-shadow: 0 20px 60px var(--shadow-strong);
      max-width: 420px;
      width: 100%;
      padding: 50px 40px;
      text-align: center;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .logo {
      width: 140px;
      height: 140px;
      margin: 0 auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 8px 24px var(--shadow);
    }

    .logo img {
      width: 80%;
      height: 80%;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    h1 {
      color: var(--text);
      font-size: 28px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 15px;
      margin-bottom: 40px;
      font-weight: 400;
    }

    .btn {
      background: var(--primary);
      color: #ffffff;
      border: none;
      padding: 14px 30px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      box-shadow: 0 4px 12px var(--shadow);
    }

    .btn:hover {
      background: var(--secondary);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      background: var(--border);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .loading {
      display: none;
      margin-top: 20px;
      color: var(--text);
      font-size: 14px;
    }

    .spinner {
      border: 3px solid var(--border);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .info-box {
      background: var(--background);
      border-left: 4px solid var(--primary);
      padding: 15px;
      margin-top: 30px;
      border-radius: 8px;
      text-align: left;
      font-size: 13px;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .info-box strong {
      display: block;
      margin-bottom: 8px;
      color: var(--primary);
    }

    .info-box p {
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .debug-log {
      background: #1e1e1e;
      color: #00ff00;
      padding: 15px;
      margin-top: 20px;
      border-radius: 4px;
      text-align: left;
      font-family: "Courier New", monospace;
      font-size: 11px;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }

    .debug-log.active {
      display: block;
    }

    .error-box {
      background: rgba(222, 95, 125, 0.1);
      border-left: 4px solid #de5f7d;
      padding: 15px;
      margin-top: 20px;
      border-radius: 8px;
      text-align: left;
      font-size: 13px;
      color: #de5f7d;
      display: none;
      border: 1px solid rgba(222, 95, 125, 0.3);
    }

    .error-box.active {
      display: block;
    }

    /* Tablet */
    @media (min-width: 768px) and (max-width: 1023px) {
      .login-container {
        max-width: 480px;
      }
    }

    /* Mobile Large */
    @media (min-width: 480px) and (max-width: 767px) {
      .login-container {
        max-width: 400px;
        padding: 45px 35px;
      }

      h1 {
        font-size: 26px;
      }

      .logo {
        width: 130px;
        height: 130px;
      }
      
      .theme-toggle {
        width: 48px;
        height: 48px;
        font-size: 22px;
      }
    }

    /* Mobile Small */
    @media (max-width: 479px) {
      body {
        padding: 15px;
      }

      .login-container {
        padding: 35px 25px;
      }

      h1 {
        font-size: 22px;
      }

      .subtitle {
        font-size: 14px;
        margin-bottom: 35px;
      }

      .logo {
        width: 110px;
        height: 110px;
        margin-bottom: 25px;
      }

      .btn {
        padding: 12px 24px;
        font-size: 15px;
      }

      .info-box {
        padding: 12px;
        font-size: 12px;
        margin-top: 25px;
      }

      .theme-toggle {
        top: 15px;
        right: 15px;
        width: 44px;
        height: 44px;
        font-size: 20px;
      }
    }
    
    /* Landscape */
    @media (max-height: 600px) and (orientation: landscape) {
      .login-container {
        padding: 30px;
        max-height: 90vh;
        overflow-y: auto;
      }
      
      .logo {
        width: 100px;
        height: 100px;
        margin-bottom: 20px;
      }
      
      h1 {
        font-size: 22px;
        margin-bottom: 6px;
      }
      
      .subtitle {
        font-size: 13px;
        margin-bottom: 30px;
      }
      
      .info-box {
        margin-top: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">
    <span id="themeIcon">🌙</span>
  </div>

  <div class="login-container">
    <div class="logo">
      <img src="https://www.zaazmago.com/canvas/wp-content/uploads/logo-zaaz-mago-001.svg" alt="ZaazMago Logo" />
    </div>
    <h1>Sistema de Actividades v1.1</h1>
    <p class="subtitle">Gestión y seguimiento de tareas</p>
    <button class="btn" id="btnLogin" onclick="iniciarSesion()">
      Iniciar Sesión con Google
    </button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p id="loadingText">Cargando tu perfil...</p>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <script>
    let debugMode = false;

    // Sistema de temas
    function toggleTheme() {
      const root = document.documentElement;
      const currentTheme = root.getAttribute('data-theme') || 'dark';
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      root.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      
      document.getElementById('themeIcon').textContent = newTheme === 'dark' ? '☀️' : '🌙';
    }

    // Cargar tema guardado
    window.addEventListener('DOMContentLoaded', function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.getElementById('themeIcon').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
    });

    function log(mensaje) {
      console.log(mensaje);
      if (debugMode) {
        const debugLog = document.getElementById("debugLog");
        if (debugLog) {
          debugLog.classList.add("active");
          const timestamp = new Date().toLocaleTimeString();
          debugLog.innerHTML += `[${timestamp}] ${mensaje}<br>`;
          debugLog.scrollTop = debugLog.scrollHeight;
        }
      }
    }

    function mostrarError(mensaje) {
      const errorBox = document.getElementById("errorBox");
      if (errorBox) {
        errorBox.textContent = mensaje;
        errorBox.classList.add("active");
      }
      log("ERROR: " + mensaje);
    }

    function ocultarError() {
      const errorBox = document.getElementById("errorBox");
      if (errorBox) {
        errorBox.classList.remove("active");
      }
    }

    function iniciarSesion() {
      const btnLogin = document.getElementById("btnLogin");
      const loadingDiv = document.getElementById("loading");
      const loadingText = document.getElementById("loadingText");
      btnLogin.disabled = true;
      loadingDiv.style.display = "block";
      loadingText.textContent = "Autenticando...";
      ocultarError();
      log("=== INICIANDO SESIÓN ===");
      google.script.run
        .withSuccessHandler(function (usuario) {
          log("✅ Respuesta recibida");
          log("Usuario: " + JSON.stringify(usuario));
          if (!usuario || !usuario.email) {
            log("❌ Usuario inválido");
            mostrarError("Error: Usuario inválido recibido del servidor");
            btnLogin.disabled = false;
            loadingDiv.style.display = "none";
            return;
          }
          log("Usuario válido: " + usuario.email + " (" + usuario.rol + ")");
          localStorage.setItem("usuario", JSON.stringify(usuario));
          log("Usuario guardado en localStorage");
          loadingText.textContent = "✓ Redirigiendo...";
          log("Redirigiendo...");
          setTimeout(function () {
            google.script.run
              .withSuccessHandler(function (html) {
                document.open();
                document.write(html);
                document.close();
              })
              .getDashboardHtml();
          }, 800);
        })
        .withFailureHandler(function (error) {
          log("❌ Error en la llamada");
          log("Error: " + JSON.stringify(error));
          mostrarError(
            "Error de autenticación:\n\n" +
            (error.message || error.toString()),
          );
          btnLogin.disabled = false;
          loadingDiv.style.display = "none";
        })
        .loginUsuario();
    }

    window.onload = function () {
      log("Página cargada");
      log("URL actual: " + window.location.href);
      const usuarioGuardado = localStorage.getItem("usuario");
      if (usuarioGuardado) {
        log("Usuario encontrado en localStorage: " + usuarioGuardado);
      } else {
        log("No hay usuario en localStorage");
      }
    };
  </script>
</body>

</html>
